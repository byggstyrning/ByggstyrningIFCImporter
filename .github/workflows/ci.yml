name: CI

# Builds and tests the portable XBIM/IFC stack (ByggstyrningRoomImporter.Ifc + unit tests).
# Revit add-ins (ByggstyrningIFCImporter, ByggstyrningRoomImporter) reference local Revit/Graphisoft
# installs and are not built in CI.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Revit add-in projects need Autodesk Revit + Graphisoft assemblies on the build machine.
# This workflow runs the xBIM-only unit tests (no Revit API).

jobs:
  test-ifc-library:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test ByggstyrningRoomImporter.Ifc (NUnit)
        working-directory: tools/ByggstyrningRoomImporter
        run: dotnet test ByggstyrningRoomImporter.Tests/ByggstyrningRoomImporter.Tests.csproj -c Release --verbosity normal

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/TestResults/**/*"
          if-no-files-found: ignore
